name: Verify Stats Badges

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  verify-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify shields.io badges are accessible
        run: |
          # Test that shields.io badges are working
          curl -s -o /dev/null -w "%{http_code}" https://img.shields.io/npm/v/astro-woocommerce.svg
          echo "Badges verified"
