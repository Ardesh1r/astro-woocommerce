<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background: WooCommerce purple to Astro orange -->
  <defs>
    <linearGradient id="wooAstroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#96588a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="64" height="64" rx="8" fill="url(#wooAstroGradient)"/>
  
  <!-- Shopping cart (WooCommerce) on left -->
  <g transform="translate(20, 32)">
    <!-- Cart body -->
    <path d="M -8 -2 L -5 8 Q -5 9 -3 9 L 8 9 Q 9 9 9 8 L 10 -2 Z" 
          fill="none" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
    
    <!-- Cart handle -->
    <path d="M -3 -2 Q -3 -8 0 -10 Q 3 -8 3 -2" 
          fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    
    <!-- Wheel -->
    <circle cx="-4" cy="10" r="1.2" fill="white"/>
  </g>
  
  <!-- Astro star (right side) -->
  <g transform="translate(42, 32)">
    <!-- Star shape -->
    <path d="M 0 -6 L 1.8 -1.8 L 6 -0.5 L 2.5 2.5 L 3.5 6.5 L 0 4 L -3.5 6.5 L -2.5 2.5 L -6 -0.5 L -1.8 -1.8 Z" 
          fill="white" stroke="white" stroke-width="0.5"/>
  </g>
</svg>
