<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- WooCommerce purple background with rounded corners -->
  <defs>
    <linearGradient id="wooPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#96588a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e3c6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="64" height="64" rx="12" fill="url(#wooPurple)"/>
  
  <!-- Stylized "W" with shopping cart integration -->
  <g transform="translate(32, 32)">
    <!-- Left stroke of W -->
    <path d="M -14 8 L -8 -8 L -4 6" 
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right stroke of W -->
    <path d="M 4 6 L 8 -8 L 14 8" 
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Small shopping cart accent (bottom right) -->
    <g transform="translate(12, 10)">
      <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>
      <path d="M -2 -1 L 2 -1 L 2.5 1 L -2.5 1 Z" 
            fill="none" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
